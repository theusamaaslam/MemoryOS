services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoryos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoryos} -d ${POSTGRES_DB:-memoryos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MEMORYOS_JWT_SECRET: ${MEMORYOS_JWT_SECRET:-change-this-in-production}
      MEMORYOS_DEFAULT_PROVIDER: ${MEMORYOS_DEFAULT_PROVIDER:-heuristic}
      MEMORYOS_EMBEDDING_PROVIDER: embeddinggemma
      MEMORYOS_EMBEDDING_MODEL_ID: ${MEMORYOS_EMBEDDING_MODEL_ID:-google/embeddinggemma-300m}
      MEMORYOS_HUGGINGFACE_TOKEN: ${MEMORYOS_HUGGINGFACE_TOKEN:-}
      MEMORYOS_OPENAI_API_KEY: ${MEMORYOS_OPENAI_API_KEY:-}
      MEMORYOS_OPENAI_MODEL: ${MEMORYOS_OPENAI_MODEL:-gpt-4o-mini}
      MEMORYOS_ANTHROPIC_API_KEY: ${MEMORYOS_ANTHROPIC_API_KEY:-}
      MEMORYOS_ANTHROPIC_MODEL: ${MEMORYOS_ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      MEMORYOS_GEMINI_API_KEY: ${MEMORYOS_GEMINI_API_KEY:-}
      MEMORYOS_GEMINI_MODEL: ${MEMORYOS_GEMINI_MODEL:-gemini-2.5-flash}
      MEMORYOS_GROQ_API_KEY: ${MEMORYOS_GROQ_API_KEY:-}
      MEMORYOS_GROQ_MODEL: ${MEMORYOS_GROQ_MODEL:-llama-3.3-70b-versatile}
      MEMORYOS_CORS_ORIGINS: ${MEMORYOS_CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173}
      MEMORYOS_REDIS_URL: redis://redis:6379/0
      MEMORYOS_POSTGRES_URL: postgresql://${POSTGRES_USER:-memoryos}:${POSTGRES_PASSWORD:-memoryos}@postgres:5432/${POSTGRES_DB:-memoryos}
    volumes:
      - huggingface_cache:/models/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.run"]
    environment:
      MEMORYOS_JWT_SECRET: ${MEMORYOS_JWT_SECRET:-change-this-in-production}
      MEMORYOS_DEFAULT_PROVIDER: ${MEMORYOS_DEFAULT_PROVIDER:-heuristic}
      MEMORYOS_EMBEDDING_PROVIDER: embeddinggemma
      MEMORYOS_EMBEDDING_MODEL_ID: ${MEMORYOS_EMBEDDING_MODEL_ID:-google/embeddinggemma-300m}
      MEMORYOS_HUGGINGFACE_TOKEN: ${MEMORYOS_HUGGINGFACE_TOKEN:-}
      MEMORYOS_OPENAI_API_KEY: ${MEMORYOS_OPENAI_API_KEY:-}
      MEMORYOS_OPENAI_MODEL: ${MEMORYOS_OPENAI_MODEL:-gpt-4o-mini}
      MEMORYOS_ANTHROPIC_API_KEY: ${MEMORYOS_ANTHROPIC_API_KEY:-}
      MEMORYOS_ANTHROPIC_MODEL: ${MEMORYOS_ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      MEMORYOS_GEMINI_API_KEY: ${MEMORYOS_GEMINI_API_KEY:-}
      MEMORYOS_GEMINI_MODEL: ${MEMORYOS_GEMINI_MODEL:-gemini-2.5-flash}
      MEMORYOS_GROQ_API_KEY: ${MEMORYOS_GROQ_API_KEY:-}
      MEMORYOS_GROQ_MODEL: ${MEMORYOS_GROQ_MODEL:-llama-3.3-70b-versatile}
      MEMORYOS_CORS_ORIGINS: ${MEMORYOS_CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173}
      MEMORYOS_REDIS_URL: redis://redis:6379/0
      MEMORYOS_POSTGRES_URL: postgresql://${POSTGRES_USER:-memoryos}:${POSTGRES_PASSWORD:-memoryos}@postgres:5432/${POSTGRES_DB:-memoryos}
    volumes:
      - huggingface_cache:/models/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  redis_data:
  huggingface_cache:
